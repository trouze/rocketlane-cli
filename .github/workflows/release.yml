name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "rocketlane-cli $GITHUB_REF_NAME" \
            --generate-notes \
          || gh release view "$GITHUB_REF_NAME" --json url -q .url

      - name: Compute tarball SHA256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: trouze/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256: ${{ needs.release.outputs.sha256 }}
        run: |
          FORMULA="homebrew-tap/Formula/rocketlane-cli.rb"
          # Update url line
          sed -i "s|url \"https://github.com/trouze/rocketlane-cli/archive/refs/tags/v[^\"]*\"|url \"https://github.com/trouze/rocketlane-cli/archive/refs/tags/v${VERSION}.tar.gz\"|" "$FORMULA"
          # Update sha256 line (the first one — the package sha, not a resource sha)
          sed -i "0,/sha256 \"[a-f0-9]*\"/s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA256}\"/" "$FORMULA"

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rocketlane-cli.rb
          git commit -m "rocketlane-cli v${{ needs.release.outputs.version }}"
          git push
